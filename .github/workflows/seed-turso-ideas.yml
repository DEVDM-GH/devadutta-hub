# Optional: push scripts/ideas-output.json to Turso from GitHub (manual only).
#
# Setup: Repo → Settings → Secrets → Actions → add TURSO_DATABASE_URL and TURSO_AUTH_TOKEN
# Run: Actions → "Seed ideas to Turso" → Run workflow → choose branch → Run
#
# Commit ideas-output.json before running. Does not run on push or PR.

name: Seed ideas to Turso

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Import ideas JSON into Turso
        run: npx tsx scripts/seed-ideas-turso.mjs
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
